<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Stamgastenformulier van het CTF"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Stamgastenformulier</title>
    <!-- CTF-foutmelder: meldt onafgevangen JS-fouten aan de backend (ops-push + software-kaart) -->
  <script>/* ctf-foutmelder */(function(){var app='stamgast';if(/^(localhost|127\.)/.test(location.hostname))return;var gezien={};function meld(m,st){try{m=String(m||'').slice(0,500);var k=m.slice(0,120);if(!m||gezien[k])return;gezien[k]=1;fetch('https://backend.cafetheaterfestival.nl/api/ops/client-error',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({app:app,message:m,stack:String(st||'').slice(0,2000),url:location.href.slice(0,300)})}).catch(function(){});}catch(e){}}window.addEventListener('error',function(e){if(e&&e.message)meld(e.message,e.error&&e.error.stack);});window.addEventListener('unhandledrejection',function(e){var r=(e&&e.reason)||{};meld(r.message||String(r),r.stack);});})();</script>
</head>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
